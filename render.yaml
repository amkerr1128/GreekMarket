databases:
  - name: greekmarket-db
    databaseName: greekmarket
    user: greekmarket

services:
  - type: web
    name: greekmarket-api
    runtime: python
    rootDir: greekmarket-backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python -m flask --app wsgi.py db upgrade
    startCommand: gunicorn --bind 0.0.0.0:$PORT wsgi:app
    healthCheckPath: /readyz
    envVars:
      - key: APP_ENV
        value: production
      - key: FLASK_APP
        value: wsgi.py
      - key: DATABASE_URL
        fromDatabase:
          name: greekmarket-db
          property: connectionString
      - key: JWT_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: JWT_COOKIE_SECURE
        value: "true"
      - key: JWT_COOKIE_SAMESITE
        value: None
      - key: JWT_COOKIE_CSRF_PROTECT
        value: "true"
      - key: MAX_CONTENT_LENGTH
        value: "26214400"

  - type: web
    name: greekmarket-web
    runtime: static
    rootDir: greekmarket-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
